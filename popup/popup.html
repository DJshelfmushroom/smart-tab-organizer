<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Tab Organizer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 280px;
      padding: 12px 16px;
      margin: 0;
    }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
    }
    label { font-size: 14px; }
    .stat { font-size: 13px; color: #555; }
    select {
      font-size: 13px;
      padding: 2px 4px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: white;
      cursor: pointer;
    }
    .status-indicator { display: flex; align-items: center; gap: 6px; }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }
    .dot.online    { background: #2ecc71; }
    .dot.offline   { background: #e74c3c; }
    .dot.loading   { background: #f39c12; }
    .dot.disabled  { background: #aaa; }
    .status-text { font-size: 13px; color: #555; }
    button {
      font-size: 13px;
      padding: 4px 10px;
      cursor: pointer;
    }
    #clearBtn {
      color: #c0392b;
      border: 1px solid #c0392b;
      background: none;
      border-radius: 3px;
    }
    #clearBtn:hover { background: #fdecea; }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    .hint { font-size: 11px; color: #999; margin-top: 2px; }
  </style>
</head>
<body>
  <h2>Smart Tab Organizer</h2>

  <div class="row">
    <label for="enableToggle">Enable</label>
    <input type="checkbox" id="enableToggle">
  </div>
  <div class="row">
    <label for="overlayToggle">In-page overlay notifications</label>
    <input type="checkbox" id="overlayToggle">
  </div>

  <hr>

  <div class="row">
    <label for="backendSelect">Embedding backend</label>
    <select id="backendSelect">
      <option value="ollama">Ollama</option>
      <option value="local">Built-in model</option>
      <option value="none">None (domain only)</option>
    </select>
  </div>

  <div class="row" id="ollamaRow">
    <span class="stat">Ollama status</span>
    <span class="status-indicator">
      <span class="dot" id="ollamaDot"></span>
      <span class="status-text" id="ollamaText">—</span>
    </span>
  </div>

  <div class="row" id="localRow" style="display:none">
    <span class="stat">Local model</span>
    <span class="status-indicator">
      <span class="dot" id="localDot"></span>
      <span class="status-text" id="localText">—</span>
    </span>
  </div>
  <div id="localHint" class="hint" style="display:none">
    Downloads ~25 MB on first use, then cached.
  </div>

  <hr>

  <div class="row">
    <span class="stat">Tokens tracked</span>
    <span id="tokenCount" class="stat">—</span>
  </div>
  <div class="row">
    <span class="stat">Matrix entries</span>
    <span id="matrixSize" class="stat">—</span>
  </div>

  <hr>

  <div class="row">
    <button id="clearBtn">Clear habit data</button>
  </div>

  <script src="../chrome-compat.js"></script>
  <script src="../storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
