name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.js

      - name: Sign Firefox extension
        run: |
          ./node_modules/.bin/web-ext sign \
            --source-dir . \
            --artifacts-dir signed \
            --channel unlisted \
            --api-key ${{ secrets.AMO_API_KEY }} \
            --api-secret ${{ secrets.AMO_API_SECRET }} \
            --ignore-files \
              "node_modules/**" ".git/**" ".github/**" "signed/**" \
              "build.js" "release.js" \
              "package.json" "package-lock.json" \
              "*.md" "*.zip" \
              "manifest.chrome.json" "background.sw.js"

      - name: Get signed XPI path
        id: xpi
        run: echo "path=$(ls signed/*.xpi | tail -1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.TAG }} \
            ${{ steps.xpi.outputs.path }} \
            chrome.zip \
            --title "${{ env.TAG }}" \
            --notes "## Install

          **Firefox**: download the \`.xpi\` and open it in Firefox (or drag it onto the browser).
          **Chrome**: download \`chrome.zip\`, unzip, and load unpacked via \`chrome://extensions\`.

          ## Build from source
          \`\`\`bash
          npm install && node build.js
          \`\`\`" \
          || gh release upload ${{ env.TAG }} \
            ${{ steps.xpi.outputs.path }} \
            chrome.zip \
            --clobber
